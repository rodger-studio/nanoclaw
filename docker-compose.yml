services:
  nanoclaw:
    image: nanoclaw:latest
    build: .
    container_name: nanoclaw
    restart: unless-stopped
    volumes:
      # Docker socket for spawning sibling agent containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent state
      - ./data:/app/data
      - ./groups:/app/groups
      - ./store:/app/store
      - ./container:/app/container
      # .env file — app reads it directly via readEnvFile() for secrets
      - ./.env:/app/.env:ro
      # Security config (mount/sender allowlists) — stored outside project root
      - ~/.config/nanoclaw:/root/.config/nanoclaw:ro
    env_file:
      - .env
    environment:
      # Tell NanoClaw where the project lives on the HOST filesystem
      # so Docker volume mounts for agent containers use correct paths
      - HOST_PROJECT_ROOT=${HOST_PROJECT_ROOT:-/home/celian/nanoclaw}
      - HOME=/root
      - TZ=${TZ:-Europe/Paris}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    # Credential proxy port (agents connect via host.docker.internal)
    # Not exposed to the internet — only reachable by sibling containers
    network_mode: host
